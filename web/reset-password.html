<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Reset password — BidReel</title>
<style>
  :root { --bg:#061623; --card:#0B2233; --line:#1D3A50; --text:#F4F6FA; --muted:#8FA3B5; --gold:#F5B82E; --red:#E5564F; --green:#3DBE7B; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:400px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:28px; }
  .logo { font-size:26px; font-weight:900; text-align:center; margin-bottom:4px; }
  .logo span { color:var(--gold); }
  h1 { font-size:17px; font-weight:700; text-align:center; margin-bottom:18px; }
  label { display:block; font-size:12px; color:var(--muted); margin:12px 0 5px; font-weight:600; letter-spacing:.4px; }
  input { width:100%; background:#081B29; border:1px solid var(--line); border-radius:9px; color:var(--text);
          padding:12px 13px; font-size:15px; outline:none; }
  input:focus { border-color:var(--gold); }
  button { width:100%; margin-top:18px; background:var(--gold); color:#1A1405; border:0; border-radius:9px;
           padding:13px; font-size:15px; font-weight:800; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .msg { margin-top:14px; font-size:13px; text-align:center; display:none; }
  .msg.err { color:var(--red); display:block; }
  .msg.ok { color:var(--green); display:block; }
  .hint { color:var(--muted); font-size:12px; text-align:center; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bid<span>Reel</span></div>
  <h1>Set a new password</h1>
  <form id="form">
    <label for="pw">New password</label>
    <input id="pw" type="password" minlength="8" required autocomplete="new-password" placeholder="At least 8 characters">
    <label for="pw2">Repeat password</label>
    <input id="pw2" type="password" minlength="8" required autocomplete="new-password" placeholder="Same again">
    <button id="submit" type="submit">Update password</button>
  </form>
  <div id="msg" class="msg"></div>
  <div class="hint">Then open the BidReel app and sign in with it.</div>
</div>
<script>
  var SUPABASE_URL = "https://ikrjbkrhawfpekocksjw.supabase.co";
  var ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlrcmpia3JoYXdmcGVrb2Nrc2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTAwMjEsImV4cCI6MjA5Njg4NjAyMX0.oqgfWiA0EioXnQ6OKHNsXXMpocqlgtOEfUgdrUT-3_g";

  // Supabase sends the recovery session in the URL hash:
  //   #access_token=…&refresh_token=…&type=recovery   (or #error_code=…)
  var params = new URLSearchParams(location.hash.replace(/^#/, ""));
  var token = params.get("access_token");
  var msg = document.getElementById("msg");
  var form = document.getElementById("form");
  var btn = document.getElementById("submit");

  function show(kind, text) { msg.className = "msg " + kind; msg.textContent = text; }

  if (params.get("error_code") || !token || params.get("type") !== "recovery") {
    form.style.display = "none";
    show("err", params.get("error_description") ||
      "This reset link is invalid or has expired. Request a new one from the app's sign-in screen.");
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var pw = document.getElementById("pw").value;
    var pw2 = document.getElementById("pw2").value;
    if (pw !== pw2) { show("err", "Passwords don't match."); return; }
    btn.disabled = true; btn.textContent = "Updating…"; msg.className = "msg";
    fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "apikey": ANON_KEY,
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ password: pw })
    }).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
      .then(function (res) {
        if (res.ok) {
          form.style.display = "none";
          show("ok", "Password updated. Open the BidReel app and sign in.");
        } else {
          show("err", (res.body && (res.body.msg || res.body.message || res.body.error_description)) ||
            "Couldn't update the password. The link may have expired — request a new one.");
          btn.disabled = false; btn.textContent = "Update password";
        }
      })
      .catch(function () {
        show("err", "Network problem — try again.");
        btn.disabled = false; btn.textContent = "Update password";
      });
  });
</script>
</body>
</html>
