<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Reset password — BidReel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0E0E10; --surface:#141416; --raised:#19191C; --border:rgba(255,255,255,0.08);
          --text:#F7F8F8; --t2:rgba(255,255,255,0.6); --tmute:rgba(255,255,255,0.5);
          --accent:#5E6AD2; --accent-hover:#6872D9; --red:#EB5757; --green:#4CB782; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text);
         font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         font-size:14px; line-height:1.4; -webkit-font-smoothing:antialiased;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:360px; background:var(--surface); border-radius:8px; padding:24px; }
  .logo { font-size:16px; font-weight:600; letter-spacing:-0.16px; margin-bottom:2px; }
  h1 { font-size:16px; font-weight:600; letter-spacing:-0.16px; margin-bottom:20px; }
  label { display:block; font-size:13px; color:var(--t2); margin:16px 0 6px; font-weight:500; }
  input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text);
          padding:8px 12px; min-height:36px; font-size:14px; font-family:inherit; outline:none;
          transition:border-color .12s ease-out; }
  input:focus { border-color:var(--accent); }
  button { width:100%; margin-top:24px; background:var(--accent); color:#FFFFFF; border:0; border-radius:6px;
           padding:0 12px; height:32px; font-size:13px; font-weight:500; font-family:inherit; cursor:pointer;
           transition:background-color .12s ease-out; }
  button:hover:not(:disabled) { background:var(--accent-hover); }
  button:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }
  button:disabled { opacity:.5; cursor:default; }
  .msg { margin-top:16px; font-size:13px; text-align:center; display:none; }
  .msg.err { color:var(--red); display:block; }
  .msg.ok { color:var(--green); display:block; }
  .hint { color:var(--tmute); font-size:13px; text-align:center; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">BidReel</div>
  <h1>Set a new password</h1>
  <form id="form">
    <label for="pw">New password</label>
    <input id="pw" type="password" minlength="8" required autocomplete="new-password" placeholder="At least 8 characters">
    <label for="pw2">Repeat password</label>
    <input id="pw2" type="password" minlength="8" required autocomplete="new-password" placeholder="Same again">
    <button id="submit" type="submit">Update password</button>
  </form>
  <div id="msg" class="msg"></div>
  <div class="hint">Then open the BidReel app and sign in with it.</div>
</div>
<script>
  var SUPABASE_URL = "https://ikrjbkrhawfpekocksjw.supabase.co";
  var ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlrcmpia3JoYXdmcGVrb2Nrc2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTAwMjEsImV4cCI6MjA5Njg4NjAyMX0.oqgfWiA0EioXnQ6OKHNsXXMpocqlgtOEfUgdrUT-3_g";

  // Supabase sends the recovery session in the URL hash:
  //   #access_token=…&refresh_token=…&type=recovery   (or #error_code=…)
  var params = new URLSearchParams(location.hash.replace(/^#/, ""));
  var token = params.get("access_token");
  var msg = document.getElementById("msg");
  var form = document.getElementById("form");
  var btn = document.getElementById("submit");

  function show(kind, text) { msg.className = "msg " + kind; msg.textContent = text; }

  if (params.get("error_code") || !token || params.get("type") !== "recovery") {
    form.style.display = "none";
    show("err", params.get("error_description") ||
      "This reset link is invalid or has expired. Request a new one from the app's sign-in screen.");
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var pw = document.getElementById("pw").value;
    var pw2 = document.getElementById("pw2").value;
    if (pw !== pw2) { show("err", "Passwords don't match."); return; }
    btn.disabled = true; btn.textContent = "Updating…"; msg.className = "msg";
    fetch(SUPABASE_URL + "/auth/v1/user", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "apikey": ANON_KEY,
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ password: pw })
    }).then(function (r) { return r.json().then(function (b) { return { ok: r.ok, body: b }; }); })
      .then(function (res) {
        if (res.ok) {
          form.style.display = "none";
          show("ok", "Password updated. Open the BidReel app and sign in.");
        } else {
          show("err", (res.body && (res.body.msg || res.body.message || res.body.error_description)) ||
            "Couldn't update the password. The link may have expired — request a new one.");
          btn.disabled = false; btn.textContent = "Update password";
        }
      })
      .catch(function () {
        show("err", "Network problem — try again.");
        btn.disabled = false; btn.textContent = "Update password";
      });
  });
</script>
</body>
</html>
