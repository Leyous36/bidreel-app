<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proposal · BidReel</title>
<meta property="og:title" content="Your video production proposal" />
<meta property="og:description" content="A client-ready proposal, prepared with BidReel." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0E0E10; --surface:#141416; --raised:#19191C; --hover:#1E1E22;
    --border:rgba(255,255,255,0.08);
    --text:#F7F8F8; --t2:rgba(255,255,255,0.6); --tmute:rgba(255,255,255,0.5);
    --accent:#5E6AD2; --green:#4CB782; --red:#EB5757;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:24px 24px 150px}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;color:var(--t2);font-size:14px}
  .spinner{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--tmute);animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  header.studio{display:flex;align-items:center;gap:12px;padding:4px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
  header.studio img{height:40px;width:40px;border-radius:8px;object-fit:cover;background:var(--raised)}
  .brandname{font-size:14px;font-weight:600;letter-spacing:-0.13px}
  .brandsub{font-size:13px;font-weight:400;color:var(--tmute);margin-top:2px}
  .preparedfor{font-size:13px;font-weight:500;color:var(--tmute);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  h1{font-size:16px;line-height:1.4;margin:0 0 16px;font-weight:600;letter-spacing:-0.16px}
  .overview{color:var(--t2);font-size:15px;line-height:1.55;white-space:pre-wrap;margin-bottom:32px}
  section{margin-bottom:32px}
  .label{font-size:13px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:12px}
  ul.clean{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  ul.clean li{position:relative;padding-left:20px;color:var(--text);font-size:14px;line-height:1.5}
  ul.clean li::before{content:"";position:absolute;left:4px;top:8px;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35)}
  .phase{background:var(--surface);border-radius:8px;padding:12px 16px;margin-bottom:8px}
  .phase .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .phase .name{font-weight:600;font-size:14px}
  .phase .dur{color:var(--t2);font-size:13px;font-weight:500;white-space:nowrap;font-variant-numeric:tabular-nums}
  .phase .det{color:var(--t2);font-size:13px;line-height:1.5;margin-top:4px}
  .invest{background:var(--surface);border-radius:8px;padding:4px 16px}
  .row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
  .row:last-child{border-bottom:none}
  .row span:first-child{color:var(--t2)}
  .row .amt{font-variant-numeric:tabular-nums;font-weight:500;color:var(--text)}
  .total{display:flex;justify-content:space-between;align-items:center;padding:14px 0 12px}
  .total .t{font-weight:600;font-size:14px}
  .total .v{font-weight:600;font-size:15px;color:var(--text);font-variant-numeric:tabular-nums}
  .terms{color:var(--tmute);font-size:13px;margin-top:8px}
  .footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--tmute);font-size:13px}
  .footer a{color:var(--accent);text-decoration:none;transition:color .12s ease-out}
  .footer a:hover{text-decoration:underline}
  .footer a:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
  .badge{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-size:13px;font-weight:500;margin-bottom:16px}
  /* sticky action bar (accept / pay) */
  .actionbar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--border);
    padding:16px 24px calc(16px + env(safe-area-inset-bottom));z-index:40}
  .actionbar .inner{max-width:760px;margin:0 auto}
  .bigbtn{width:100%;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:14px;font-weight:500;
    font-family:inherit;padding:12px;cursor:pointer;transition:filter .12s ease-out,opacity .12s ease-out}
  .bigbtn:hover{filter:brightness(1.1)}
  .bigbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .bigbtn:active{opacity:.85}
  .bigbtn:disabled{opacity:.6;cursor:default;filter:none}
  .barnote{text-align:center;color:var(--tmute);font-size:13px;margin-top:8px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:60}
  .overlay.open{display:flex}
  .modal{width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);
    border-radius:8px 8px 0 0;padding:24px 24px calc(24px + env(safe-area-inset-bottom));box-shadow:0 4px 24px rgba(0,0,0,0.2)}
  @media(min-width:560px){.overlay{align-items:center}.modal{border-radius:8px}}
  .modal h3{margin:0 0 6px;font-size:15px;font-weight:600;letter-spacing:-0.16px}
  .modal p{margin:0 0 16px;color:var(--t2);font-size:14px;line-height:1.5}
  .modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);
    font-family:inherit;font-size:15px;padding:10px 12px;outline:none;transition:border-color .12s ease-out}
  .modal input::placeholder{color:var(--tmute)}
  .modal input:hover{border-color:rgba(255,255,255,0.14)}
  .modal input:focus{border-color:var(--accent)}
  .mrow{display:flex;gap:8px;margin-top:16px}
  .ghost{flex:1;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:background-color .12s ease-out,border-color .12s ease-out}
  .ghost:hover{background:var(--hover)}
  .ghost:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .confirm{flex:2;background:var(--accent);border:none;color:#fff;border-radius:6px;padding:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:filter .12s ease-out,opacity .12s ease-out}
  .confirm:hover{filter:brightness(1.1)}
  .confirm:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .confirm:disabled{opacity:.5;cursor:default;filter:none}
  .err{color:var(--red);font-size:13px;margin-top:8px;min-height:16px}
  .status-box{background:var(--surface);border-radius:8px;padding:16px;margin-top:4px}
  .status-box .t{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  .status-box.green .t{color:var(--green)}
  .status-box .s{color:var(--t2);font-size:14px;margin-top:6px;line-height:1.5}
  /* readable print output */
  @media print{
    :root{--bg:#ffffff;--surface:#f4f4f5;--raised:#ececee;--hover:#ececee;--border:rgba(0,0,0,0.12);
      --text:#18181B;--t2:rgba(0,0,0,0.65);--tmute:rgba(0,0,0,0.5)}
    html,body{background:#fff;color:#18181B}
    .actionbar,.overlay,.spinner{display:none !important}
    .wrap{padding-bottom:24px}
    ul.clean li::before{background:rgba(0,0,0,0.4)}
  }
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="center"><div class="spinner"></div><div>Loading proposal…</div></div>
</div>

<!-- Accept modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Accept this proposal</h3>
    <p>Type your full name below. This acts as your signature and notifies the studio.</p>
    <input id="acceptName" type="text" placeholder="Your full name" autocomplete="name" />
    <div class="err" id="acceptErr"></div>
    <div class="mrow">
      <button class="ghost" id="acceptCancel">Cancel</button>
      <button class="confirm" id="acceptConfirm">Accept proposal</button>
    </div>
  </div>
</div>

<script>
  // --- config: anon key is public by design (already shipped in the app) ---
  var SUPABASE_URL = "https://ikrjbkrhawfpekocksjw.supabase.co";
  var ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlrcmpia3JoYXdmcGVrb2Nrc2p3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTAwMjEsImV4cCI6MjA5Njg4NjAyMX0.oqgfWiA0EioXnQ6OKHNsXXMpocqlgtOEfUgdrUT-3_g";

  function getToken(){
    var p = location.pathname.replace(/\/+$/,"").split("/");
    var last = p[p.length-1];
    if(last && last !== "p" && last.indexOf("proposal") !== 0) return last;
    var u = new URL(location.href);
    return u.searchParams.get("t") || u.searchParams.get("token") || location.hash.replace(/^#/,"") || "";
  }
  var TOKEN = getToken();
  var PAID = new URL(location.href).searchParams.get("paid") === "1";
  var DATA = null;

  function esc(s){var d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
  function money(n){return "$"+Number(n||0).toLocaleString();}
  function cents(c){return "$"+Math.round(Number(c||0)/100).toLocaleString();}

  function render(d){
    DATA = d;
    var p = d.proposal, s = d.studio || {}, st = d.state || {};
    // Apply the studio's brand color to the page accent.
    if (s.color) { try { document.documentElement.style.setProperty("--accent", s.color); } catch (e) {} }
    var logo = s.logo ? '<img src="'+esc(s.logo)+'" alt="" />'
      : '<div style="height:40px;width:40px;border-radius:8px;background:var(--raised);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--t2)">'+esc((s.name||"S").slice(0,1))+'</div>';
    var html = '';
    html += '<header class="studio">'+logo+'<div><div class="brandname">'+esc(s.name||"Proposal")+'</div>'+
            (s.producer?'<div class="brandsub">'+esc(s.producer)+'</div>':'')+'</div></header>';
    if(st.accepted || PAID || st.deposit_status==='paid'){ html += '<div class="badge">✓ Accepted</div>'; }
    html += '<div class="preparedfor">Prepared for '+esc(d.client_name||"")+'</div>';
    html += '<h1>'+esc(p.subject||"Video Production Proposal")+'</h1>';
    if(p.overview) html += '<div class="overview">'+esc(p.overview)+'</div>';

    if(p.scope && p.scope.length){
      html += '<section><div class="label">Scope of work</div><ul class="clean">'+
        p.scope.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul></section>';
    }
    if(p.deliverables && p.deliverables.length){
      html += '<section><div class="label">Deliverables</div><ul class="clean">'+
        p.deliverables.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul></section>';
    }
    if(p.timeline && p.timeline.length){
      html += '<section><div class="label">Timeline</div>'+
        p.timeline.map(function(t){return '<div class="phase"><div class="top"><span class="name">'+esc(t.phase)+
          '</span><span class="dur">'+esc(t.duration)+'</span></div>'+(t.details?'<div class="det">'+esc(t.details)+'</div>':'')+'</div>';}).join('')+
        '</section>';
    }
    if(p.investment){
      var inv = p.investment;
      var rows = (inv.breakdown||[]).map(function(b){
        return '<div class="row"><span>'+esc(b.item)+'</span><span class="amt">'+money(b.amount)+'</span></div>';}).join('');
      html += '<section><div class="label">Investment</div><div class="invest">'+rows+
        '<div class="total"><span class="t">Total</span><span class="v">'+money(inv.total)+'</span></div></div>'+
        (inv.paymentTerms?'<div class="terms">'+esc(inv.paymentTerms)+'</div>':'')+'</section>';
    }
    if(p.whyUs){
      html += '<section><div class="label">Why us</div><div class="overview" style="margin-bottom:0">'+esc(p.whyUs)+'</div></section>';
    }
    html += '<section id="stateSlot"></section>';
    html += '<div class="footer">Prepared with <a href="https://bidreel.io">BidReel</a></div>';
    document.getElementById('root').innerHTML = html;
    document.title = (p.subject || "Proposal") + " · " + (s.name || "BidReel");
    renderActions();
  }

  // Decide which sticky bar / inline state to show, based on DATA.state.
  function renderActions(){
    var st = (DATA && DATA.state) || {};
    var slot = document.getElementById('stateSlot');
    if(slot) slot.innerHTML = '';
    setBar(null);

    var paid = PAID || st.deposit_status === 'paid';
    var hasDeposit = Number(st.deposit_amount_cents||0) >= 100;

    if(paid){
      if(slot) slot.innerHTML =
        '<div class="status-box green"><div class="t">✓ Deposit paid — you\'re booked</div>'+
        '<div class="s">Thank you. The studio has been notified and will reach out with next steps.</div></div>';
      return;
    }
    if(!st.accepted){
      setBar('<button class="bigbtn" id="acceptBtn">Accept proposal</button>'+
             '<div class="barnote">No account needed · you\'ll get a copy by email</div>');
      document.getElementById('acceptBtn').addEventListener('click', openModal);
      return;
    }
    // accepted:
    if(hasDeposit){
      setBar('<button class="bigbtn" id="payBtn">Pay deposit '+cents(st.deposit_amount_cents)+' &rarr;</button>'+
             '<div class="barnote">Secure card payment via Stripe</div>');
      document.getElementById('payBtn').addEventListener('click', startCheckout);
    } else if(slot){
      slot.innerHTML =
        '<div class="status-box green"><div class="t">✓ Accepted</div>'+
        '<div class="s">'+(DATA.accepted_by_name?('Accepted by '+esc(DATA.accepted_by_name)+'. '):'')+
        'The studio has been notified — they\'ll be in touch with next steps.</div></div>';
    }
  }

  function setBar(innerHTML){
    var ex = document.getElementById('actionbar');
    if(ex) ex.remove();
    if(!innerHTML) return;
    var bar = document.createElement('div');
    bar.id='actionbar'; bar.className='actionbar';
    bar.innerHTML = '<div class="inner">'+innerHTML+'</div>';
    document.body.appendChild(bar);
  }

  // ---- Accept ----
  function openModal(){ document.getElementById('overlay').classList.add('open');
    setTimeout(function(){ document.getElementById('acceptName').focus(); }, 60); }
  function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
  function wireModal(){
    document.getElementById('acceptCancel').addEventListener('click', closeModal);
    document.getElementById('overlay').addEventListener('click', function(e){ if(e.target.id==='overlay') closeModal(); });
    document.getElementById('acceptConfirm').addEventListener('click', submitAccept);
  }
  function submitAccept(){
    var name = (document.getElementById('acceptName').value||'').trim();
    var err = document.getElementById('acceptErr');
    var btn = document.getElementById('acceptConfirm');
    if(!name){ err.textContent = 'Please type your name to accept.'; return; }
    err.textContent=''; btn.disabled=true; btn.textContent='Accepting…';
    api("proposal-accept", { token:TOKEN, name:name })
    .then(function(){
      closeModal();
      DATA.state.accepted = true; DATA.accepted_by_name = name;
      render(DATA);                 // re-render → reveals Pay bar (or accepted box)
      window.scrollTo({top:0, behavior:'smooth'});
    })
    .catch(function(e){ err.textContent = e.message || 'Something went wrong.';
      btn.disabled=false; btn.textContent='Accept proposal'; });
  }

  // ---- Pay deposit ----
  function startCheckout(){
    var btn = document.getElementById('payBtn');
    if(btn){ btn.disabled=true; btn.textContent='Opening secure checkout…'; }
    api("deposit-checkout", { token:TOKEN })
    .then(function(j){
      if(j.alreadyPaid){ PAID = true; render(DATA); return; }
      if(j.url){ window.location.href = j.url; return; }
      throw new Error('Could not start checkout');
    })
    .catch(function(e){
      if(btn){ btn.disabled=false; btn.innerHTML='Pay deposit '+cents((DATA.state||{}).deposit_amount_cents)+' &rarr;'; }
      alert(e.message || 'Payment could not be started.');
    });
  }

  // ---- helpers ----
  function api(fn, body){
    return fetch(SUPABASE_URL+"/functions/v1/"+fn, {
      method:"POST",
      headers:{ "apikey":ANON, "Authorization":"Bearer "+ANON, "Content-Type":"application/json" },
      body: JSON.stringify(body)
    }).then(function(r){ return r.json().then(function(j){ if(!r.ok || j.error){ throw new Error(j.error||'Request failed'); } return j; }); });
  }

  function fail(msg){
    setBar(null);
    document.getElementById('root').innerHTML =
      '<div class="center"><div style="color:var(--text);font-weight:600;font-size:15px">'+esc(msg)+'</div>'+
      '<div>This link may have been turned off or is incorrect.</div></div>';
  }

  function boot(){
    wireModal();
    if(!TOKEN){ fail("Proposal not found"); return; }
    fetch(SUPABASE_URL+"/functions/v1/proposal-public?token="+encodeURIComponent(TOKEN), {
      headers: { "apikey": ANON, "Authorization": "Bearer "+ANON }
    })
    .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
    .then(function(res){ if(!res.ok || res.j.error) return fail("Proposal not found"); render(res.j); })
    .catch(function(){ fail("Couldn't load this proposal"); });
  }
  wireModal(); render({"client_name": "Northwind Capital", "proposal": {"subject": "Corporate Brand Film — Northwind Capital", "overview": "A cinematic brand film positioning Northwind Capital as the steady hand in a volatile market — built to earn trust with founders and LPs alike.", "scope": ["Creative direction, treatment & shot list", "2-day principal photography, 2 locations", "Cinema camera, lighting & sound package", "Editorial, color grade & licensed score", "Two rounds of revisions"], "deliverables": ["90-second hero film (16:9 + 9:16)", "Three 30-second social cutdowns", "Stills package from the shoot"], "timeline": [{"phase": "Pre-Production", "duration": "2 wks", "details": "Creative, casting, logistics"}, {"phase": "Production", "duration": "2 days", "details": "Principal photography across two locations"}, {"phase": "Post-Production", "duration": "3 wks", "details": "Edit, color, sound, licensed score"}, {"phase": "Delivery", "duration": "3 days", "details": "Final masters + social cutdowns"}], "investment": {"total": 38500, "breakdown": [{"item": "Pre-production & creative", "amount": 6500}, {"item": "Production — 2 shoot days", "amount": 18000}, {"item": "Post-production & color", "amount": 11000}, {"item": "Licensing & deliverables", "amount": 3000}], "paymentTerms": "50% to book · 50% on delivery"}, "whyUs": "Twenty years across Fortune 500 brands and Wall Street, translated into films that move markets. You get a small senior team, not a rotating crew."}, "state": {"accepted": true, "deposit_status": "none", "deposit_amount_cents": 1925000, "currency": "usd"}, "studio": {"name": "Amerifilms", "producer": "Souley Oumarou", "logo": null, "color": "#4D8DF7"}, "accepted_by_name": "Dana Whitfield"});
</script>
</body>
</html>
