<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Payouts connected · BidReel</title>
<style>
  :root{--bg:#0B0E13;--text:#F4F6FA;--t2:#94A0B8;--accent:#F5B82E;--green:#3DBE7B;--border:#262E3F}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .box{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px}
  .ring{width:74px;height:74px;border-radius:50%;background:rgba(61,190,123,.13);border:2px solid var(--green);
    display:flex;align-items:center;justify-content:center;color:var(--green);font-size:38px}
  h1{font-size:22px;margin:6px 0 0}
  p{color:var(--t2);font-size:15px;line-height:1.5;max-width:380px;margin:0}
  .brand{position:absolute;top:22px;font-weight:800;letter-spacing:.3px}
  .brand span{color:var(--accent)}
</style>
</head>
<body>
  <div class="brand">Bid<span>Reel</span></div>
  <div class="box">
    <div class="ring">✓</div>
    <h1>Payouts connected</h1>
    <p>Your Stripe account is set up. You can close this window and return to the
       BidReel app — deposits on accepted proposals will land in your account.</p>
  </div>
</body>
</html>
